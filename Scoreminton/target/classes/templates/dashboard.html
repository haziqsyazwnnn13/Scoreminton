<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreminton - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 min-h-screen flex items-center justify-center font-sans sm:p-6">

<div class="bg-white w-full sm:max-w-md md:max-w-3xl lg:max-w-4xl min-h-screen sm:min-h-[700px] sm:h-auto sm:rounded-3xl sm:shadow-xl p-6 md:p-10 flex flex-col relative">

    <div class="flex justify-between items-start mt-2 md:mt-0">
        <div>
            <h2 class="text-2xl md:text-3xl font-bold text-zinc-900" th:text="'Hello, ' + ${user.username}">Hello, User</h2>
            <p class="text-sm text-zinc-500 italic">Ready for a smash?</p>
        </div>
        <a href="/logout" class="text-sm font-semibold text-zinc-600 bg-zinc-100 px-4 py-2 rounded-full hover:bg-zinc-200 transition">Logout</a>
    </div>

    <div class="bg-zinc-50 border border-zinc-200 rounded-2xl p-4 my-8 flex flex-col h-64 md:h-80 shadow-inner relative w-full overflow-y-auto">
        <span class="text-xs uppercase tracking-wider font-bold text-zinc-400 mb-3 block sticky top-0 bg-zinc-50 py-1">Recent Activity & Scores</span>

        <div th:if="${#lists.isEmpty(matches)}" class="flex-grow flex flex-col items-center justify-center text-center">
            <p class="text-sm font-medium text-zinc-400 italic">No matches tracked yet.</p>
            <p class="text-xs text-zinc-400 mt-0.5">Start your first live layout below!</p>
        </div>

        <div th:if="${!#lists.isEmpty(matches)}" class="space-y-2.5">
            <div th:each="match : ${matches}" class="flex items-center justify-between bg-white border border-zinc-200 rounded-xl px-4 py-3 shadow-sm transition hover:border-zinc-300">
                <div class="flex flex-col flex-1 gap-1">
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-sm text-zinc-700" th:text="${match.teamOneName}">Team 1</span>
                        <span class="font-black text-base text-zinc-900" th:text="${match.teamOneScore}">0</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-sm text-zinc-700" th:text="${match.teamTwoName}">Team 2</span>
                        <span class="font-black text-base text-zinc-900" th:text="${match.teamTwoScore}">0</span>
                    </div>
                </div>
                <div class="ml-4 pl-3 border-l border-zinc-200 flex flex-col items-end justify-center min-w-[75px]">
                    <span th:if="${match.status == 'COMPLETED'}" class="text-[10px] font-bold uppercase bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded">Finished</span>
                    <span th:if="${match.status != 'COMPLETED'}" class="text-[10px] font-bold uppercase bg-blue-50 text-blue-600 px-2 py-0.5 rounded animate-pulse">Live Now</span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow content-center w-full mb-8">
        <a href="/matches/create" class="w-full bg-zinc-900 text-white font-medium py-4 md:py-5 rounded-xl text-center shadow-md hover:bg-zinc-800 transition duration-150 transform hover:scale-[1.01] flex items-center justify-center text-lg">
            <svg class="w-6 h-6 mr-3 stroke-current" fill="none" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="15" cy="9" r="5"/><path stroke-linecap="round" stroke-linejoin="round" d="M11.5 12.5L5 19M3 21l2-2M14 8h2m-1-1v2"/></svg>
            Create Match
        </a>

        <a href="/players/manage" class="w-full bg-white border border-zinc-300 text-zinc-800 font-medium py-4 md:py-5 rounded-xl text-center shadow-sm hover:bg-zinc-50 transition duration-150 transform hover:scale-[1.01] flex items-center justify-center text-lg">
            <svg class="w-6 h-6 mr-3 stroke-current" fill="none" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Manage Players and Teams
        </a>

        <a href="/matches/history" class="w-full bg-white border border-zinc-300 text-zinc-800 font-medium py-4 md:py-5 rounded-xl text-center shadow-sm hover:bg-zinc-50 transition duration-150 transform hover:scale-[1.01] flex items-center justify-center text-lg">
            <svg class="w-6 h-6 mr-3 stroke-current" fill="none" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
            Match History
        </a>

        <a href="#" class="w-full bg-zinc-300 text-zinc-700 font-medium py-4 md:py-5 rounded-xl text-center shadow-sm opacity-60 cursor-not-allowed flex items-center justify-center text-lg">
            <svg class="w-6 h-6 mr-3 stroke-current" fill="none" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
            Quick Rematch
        </a>
    </div>

    <div class="text-center pb-4 mt-auto">
        <span class="text-xl md:text-2xl font-bold tracking-[0.3em] text-zinc-300">SCOREMINTON</span>
    </div>

</div>

</body>
</html>
