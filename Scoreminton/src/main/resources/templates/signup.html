<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreminton - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center font-sans sm:p-6">

<div class="bg-white w-full sm:max-w-md md:max-w-lg lg:max-w-xl min-h-screen sm:min-h-[650px] sm:h-auto sm:rounded-3xl sm:shadow-2xl p-8 md:p-12 flex flex-col items-center justify-center relative">

    <h1 class="text-4xl md:text-5xl text-gray-800 mb-10 font-bold tracking-tight">Register</h1>

    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 text-center text-sm w-full max-w-sm">
        <p th:text="${error}"></p>
    </div>

    <form action="/signup" method="POST" class="w-full max-w-sm flex flex-col items-center gap-5">

        <input type="text" name="username" placeholder="Username" required
               class="w-full border border-gray-400 rounded-lg px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-gray-600 transition">

        <input type="email" name="email" placeholder="Email Address" required
               class="w-full border border-gray-400 rounded-lg px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-gray-600 transition">

        <input type="password" name="password" placeholder="Password" required
               class="w-full border border-gray-400 rounded-lg px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-gray-600 transition">

        <button type="submit"
                class="mt-6 w-full md:w-3/4 bg-gray-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md hover:bg-gray-800 transition duration-200 text-lg">
            Create Account
        </button>
    </form>

    <div class="mt-8 text-center text-sm md:text-base text-gray-600">
        <p>Already have an account? <a href="/login" class="font-semibold text-gray-800 hover:underline">Log in</a></p>
    </div>

</div>

</body>
</html>
